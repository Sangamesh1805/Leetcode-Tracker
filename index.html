<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode Tracker — Sangamesh</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #07070F;
      --surface: #0E0E1C;
      --surface2: #13132A;
      --border: #1E1E38;
      --text: #E8E8F4;
      --muted: #8888AA;
      --easy: #00B85E;
      --medium: #F59E0B;
      --hard: #EF4444;
      --solved: #00B85E;
      --revised: #7B2FBE;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* HERO */
    .hero {
      background: radial-gradient(ellipse 100% 60% at 50% 0%, #1A0A3020 0%, transparent 70%), var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 48px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 39px, #1A1A3010 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1A1A3010 40px);
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      background: #1A1A35;
      border: 1px solid #3A2A8C;
      border-radius: 20px;
      padding: 6px 20px;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #9A8FD4;
      margin-bottom: 20px;
      font-family: 'Space Mono', monospace;
    }

    h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #B8B0FF 50%, #7B6FD4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero-sub {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 32px;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .stat-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 100px;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 800;
      font-family: 'Space Mono', monospace;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      max-width: 500px;
      margin: 0 auto 8px;
    }

    .progress-track {
      height: 8px;
      background: #1A1A30;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #7B2FBE, #00B4D8);
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .filter-btn {
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all 0.2s;
      font-family: 'Syne', sans-serif;
    }

    .filter-btn:hover {
      border-color: #5555AA;
      color: var(--text);
    }

    .filter-btn.active {
      background: #1E1E45;
      border-color: #6655CC;
      color: #C0B0FF;
    }

    .filter-btn.easy-btn.active {
      background: #00B85E18;
      border-color: var(--easy);
      color: var(--easy);
    }

    .filter-btn.medium-btn.active {
      background: #F59E0B18;
      border-color: var(--medium);
      color: var(--medium);
    }

    .filter-btn.hard-btn.active {
      background: #EF444418;
      border-color: var(--hard);
      color: var(--hard);
    }

    /* SEARCH */
    .search-wrap {
      max-width: 420px;
      margin: 16px auto 0;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 16px 11px 40px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: #5555AA;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
    }

    /* MAIN */
    .main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 16px 0;
    }

    /* TOPIC SECTION */
    .topic-section {
      margin-bottom: 10px;
    }

    .connector {
      width: 2px;
      height: 14px;
      margin-left: 28px;
      opacity: 0.3;
      border-radius: 2px;
    }

    .topic-header {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .topic-header:hover {
      background: var(--surface2);
    }

    .topic-header.open {
      border-radius: 14px 14px 0 0;
    }

    .topic-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .topic-meta {
      flex: 1;
    }

    .topic-name {
      font-size: 16px;
      font-weight: 700;
      color: #F0F0FF;
    }

    .topic-counts {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      font-family: 'Space Mono', monospace;
    }

    .topic-mini-progress {
      width: 100px;
      height: 4px;
      background: #1A1A30;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .topic-mini-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .chevron {
      font-size: 13px;
      transition: transform 0.25s;
      color: var(--muted);
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    /* QUESTION TABLE */
    .topic-body {
      background: #0B0B1A;
      border: 1px solid;
      border-top: none;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      display: none;
    }

    .topic-body.open {
      display: block;
    }

    .q-table {
      width: 100%;
      border-collapse: collapse;
    }

    .q-table thead tr {
      background: #090918;
      border-bottom: 1px solid var(--border);
    }

    .q-table th {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-align: left;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    .q-table th:last-child,
    .q-table th:nth-last-child(2) {
      text-align: center;
    }

    .q-row {
      border-bottom: 1px solid #12122A;
      transition: background 0.15s;
    }

    .q-row:last-child {
      border-bottom: none;
    }

    .q-row:hover {
      background: #10102288;
    }

    .q-row.solved-row {
      background: #00B85E06;
    }

    .q-row.revised-row {
      background: #7B2FBE06;
    }

    .q-row.hidden {
      display: none;
    }

    .q-table td {
      padding: 11px 14px;
      font-size: 13px;
      vertical-align: middle;
    }

    .q-num {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      width: 50px;
    }

    .q-link {
      color: #C0C0F0;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s;
    }

    .q-link:hover {
      color: #A090FF;
      text-decoration: underline;
    }

    .q-link.solved-text {
      color: #00B85E;
    }

    .diff-badge {
      display: inline-block;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px;
    }

    .easy-badge {
      background: #00B85E18;
      color: var(--easy);
      border: 1px solid #00B85E40;
    }

    .medium-badge {
      background: #F59E0B18;
      color: var(--medium);
      border: 1px solid #F59E0B40;
    }

    .hard-badge {
      background: #EF444418;
      color: var(--hard);
      border: 1px solid #EF444440;
    }

    .cb-cell {
      text-align: center;
      width: 70px;
    }

    .cb-wrap {
      display: flex;
      justify-content: center;
    }

    .custom-cb {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .custom-cb.solved-cb {
      border-color: #00B85E50;
      background: transparent;
    }

    .custom-cb.solved-cb.checked {
      background: var(--easy);
      border-color: var(--easy);
    }

    .custom-cb.revised-cb {
      border-color: #7B2FBE50;
      background: transparent;
    }

    .custom-cb.revised-cb.checked {
      background: var(--revised);
      border-color: var(--revised);
    }

    .custom-cb::after {
      content: '✓';
      color: white;
      font-size: 13px;
      font-weight: 800;
      display: none;
    }

    .custom-cb.checked::after {
      display: block;
    }

    .q-pattern {
      font-size: 11px;
      color: #5555778;
      font-style: italic;
    }

    /* LEGEND */
    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 24px 0 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 2px solid;
    }

    /* RESET BTN */
    .reset-btn {
      background: #1A1A30;
      border: 1px solid #2A2A48;
      color: var(--muted);
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: all 0.2s;
      margin-top: 16px;
    }

    .reset-btn:hover {
      border-color: #EF444450;
      color: #EF4444;
    }

    @media (max-width: 600px) {

      .q-table th:nth-child(5),
      .q-table td:nth-child(5) {
        display: none;
      }

      .topic-name {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="badge">DSA · LeetCode · Java Dev Roadmap</div>
    <h1>LeetCode Tracker</h1>
    <p class="hero-sub">Track every question — solved & revised. Organized by topic.</p>

    <div class="stats-bar">
      <div class="stat-chip">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" style="color:var(--easy)" id="stat-solved">0</span>
        <span class="stat-label">Solved</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" style="color:var(--revised)" id="stat-revised">0</span>
        <span class="stat-label">Revised</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" style="color:var(--easy)" id="stat-easy-c">0</span>
        <span class="stat-label">Easy</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" style="color:var(--medium)" id="stat-med-c">0</span>
        <span class="stat-label">Medium</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" style="color:var(--hard)" id="stat-hard-c">0</span>
        <span class="stat-label">Hard</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 / 0 solved</div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn easy-btn" onclick="setFilter('Easy',this)">Easy</button>
      <button class="filter-btn medium-btn" onclick="setFilter('Medium',this)">Medium</button>
      <button class="filter-btn hard-btn" onclick="setFilter('Hard',this)">Hard</button>
      <button class="filter-btn" onclick="setFilter('unsolved',this)">Unsolved</button>
      <button class="filter-btn" onclick="setFilter('solved',this)">✅ Solved</button>
      <button class="filter-btn" onclick="setFilter('revised',this)">🔁 Revised</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="search-input" placeholder="Search question name..."
        oninput="doSearch(this.value)">
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--easy);border-color:var(--easy)"></div> Solved
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--revised);border-color:var(--revised)"></div> Revised
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:transparent;border-color:var(--easy)50"></div> Mark solved →
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:transparent;border-color:var(--revised)50"></div> Mark revised →
      </div>
    </div>
    <button class="reset-btn" onclick="resetAll()">🗑 Reset All Progress</button>
  </div>

  <div class="main" id="main"></div>

  <script>
    const topics = [
      {
        id: "arrays", icon: "📦", name: "Arrays & Strings", color: "#FF6B35", accent: "#FF9F1C",

      },
      {
        id: "strings", icon: "🔤", name: "Strings", color: "#E9724C", accent: "#FFAB6B",
        questions: [
          { num: 125, name: "Valid Palindrome", diff: "Easy", url: "https://leetcode.com/problems/valid-palindrome/", pattern: "Two Pointers" },

    // STATE
    const state = {};
    const STORAGE_KEY = 'lc_tracker_v1';

    function loadState() {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        if (s) Object.assign(state, JSON.parse(s));
      } catch (e) { }
    }
    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { }
    }

    function getKey(topicId, qNum, type) { return `${topicId}_${qNum}_${type}`; }

    function isChecked(topicId, qNum, type) {
      return !!state[getKey(topicId, qNum, type)];
    }
    function toggleCheck(topicId, qNum, type) {
      const k = getKey(topicId, qNum, type);
      state[k] = !state[k];
      saveState();
      updateRow(topicId, qNum);
      updateStats();
      updateTopicProgress(topicId);
    }

    // BUILD UI
    loadState();

      const sec = document.createElement('div');

      sec.id = `sec-${topic.id}`;

      const total = topic.questions.length;

      sec.innerHTML = `

    function updateRow(topicId, qNum) {
      const s = isChecked(topicId, qNum, 'solved');
      const r = isChecked(topicId, qNum, 'revised');
      const scb = document.getElementById(`scb-${topicId}-${qNum}`);

      const row = document.getElementById(`row-${topicId}-${qNum}`);

      if (rcb) rcb.classList.toggle('checked', r);
      if (row) {
        row.classList.toggle('solved-row', s);
        row.classList.toggle('revised-row', r && !s);
      }
      if (link) link.classList.toggle('solved-text', s);
    }

    function updateTopicProgress(topicId) {
      const topic = topics.find(t => t.id === topicId);
      if (!topic) return;
      let solved = 0, revised = 0;
      topic.questions.forEach(q => {
        if (isChecked(topicId, q.num, 'solved')) solved++;
        if (isChecked(topicId, q.num, 'revised')) revised++;
      });
      const total = topic.questions.length;
      const scEl = document.getElementById(`sc-${topicId}`);
      const rcEl = document.getElementById(`rc-${topicId}`);
      const mini = document.getElementById(`mini-${topicId}`);
      if (scEl) scEl.textContent = solved;
      if (rcEl) rcEl.textContent = revised;
      if (mini) mini.style.width = `${Math.round(solved / total * 100)}%`;
    }

    function updateStats() {
      let totalQ = 0, totalSolved = 0, totalRevised = 0;
      let easySolved = 0, medSolved = 0, hardSolved = 0;
      topics.forEach(topic => {
        topic.questions.forEach(q => {
          totalQ++;
          const s = isChecked(topic.id, q.num, 'solved');
          const r = isChecked(topic.id, q.num, 'revised');
          if (s) { totalSolved++; if (q.diff === 'Easy') easySolved++; else if (q.diff === 'Medium') medSolved++; else hardSolved++; }
          if (r) totalRevised++;
        });
      });
      document.getElementById('stat-total').textContent = totalQ;
      document.getElementById('stat-solved').textContent = totalSolved;
      document.getElementById('stat-revised').textContent = totalRevised;
      document.getElementById('stat-easy-c').textContent = easySolved;
      document.getElementById('stat-med-c').textContent = medSolved;
      document.getElementById('stat-hard-c').textContent = hardSolved;
      const pf = document.getElementById('progress-fill');
      const pl = document.getElementById('progress-label');
      pf.style.width = totalQ > 0 ? `${Math.round(totalSolved / totalQ * 100)}%` : '0%';
      pl.textContent = `${totalSolved} / ${totalQ} solved`;
    }

    function toggleTopic(id) {
      const body = document.getElementById(`body-${id}`);
      const hdr = document.getElementById(`hdr-${id}`);
      const chev = document.getElementById(`chev-${id}`);
      const topic = topics.find(t => t.id === id);
      const open = body.classList.toggle('open');
      hdr.classList.toggle('open', open);
      chev.classList.toggle('open', open);
      if (open) {
        hdr.style.background = 'linear-gradient(135deg, #12122A, #1A1A38)';
        hdr.style.borderColor = topic.color + '60';
      } else {
        hdr.style.background = '';
        hdr.style.borderColor = '';
      }
    }

    let activeFilter = 'all';
    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }
    function doSearch(val) { applyFilters(); }
    function applyFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      document.querySelectorAll('.q-row').forEach(row => {
        const diff = row.dataset.diff;
        const name = row.dataset.name;
        const topicId = row.dataset.topic;
        const qNum = parseInt(row.id.split('-').pop());
        const solved = isChecked(topicId, qNum, 'solved');
        const revised = isChecked(topicId, qNum, 'revised');

        let show = true;
        if (activeFilter === 'Easy' && diff !== 'Easy') show = false;
        if (activeFilter === 'Medium' && diff !== 'Medium') show = false;
        if (activeFilter === 'Hard' && diff !== 'Hard') show = false;
        if (activeFilter === 'solved' && !solved) show = false;
        if (activeFilter === 'unsolved' && solved) show = false;
        if (activeFilter === 'revised' && !revised) show = false;
        if (search && !name.includes(search)) show = false;

        row.classList.toggle('hidden', !show);
      });
    }

    function resetAll() {
      if (!confirm('Reset ALL progress? This cannot be undone.')) return;
      Object.keys(state).forEach(k => delete state[k]);
      saveState();
      topics.forEach(topic => {
        topic.questions.forEach(q => updateRow(topic.id, q.num));
        updateTopicProgress(topic.id);
      });
      updateStats();
    }

    updateStats();
  </script>
</body>

</html>
